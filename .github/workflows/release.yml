name: Build & Release

# Triggers when you push a tag like:
#   git tag v1.1.0
#   git push origin v1.1.0
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Write _client_id.py from secret
        env:
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
        run: |
          echo "CLIENT_ID = '$env:DISCORD_CLIENT_ID'" > _client_id.py

      - name: Extract version from tag and patch main.py
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          (Get-Content main.py) -replace 'APP_VERSION = "[^"]*"', "APP_VERSION = `"$version`"" | Set-Content main.py
          Write-Output "Building version $version"

      - name: Build exe with PyInstaller
        run: |
          pyinstaller LoLCustomRPC.spec

      - name: Create GitHub Release and upload exe
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LoLCustomRPC.exe
          generate_release_notes: true
